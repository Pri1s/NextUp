<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Triage – NextUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a class="back-link" href="/" aria-label="Back to clips">←</a>
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">NU</span>
      <h1>Frame triage <span>/ <span id="clip-name"></span></span></h1>
    </div>
    <div class="header-spacer"></div>
    <div class="filters" id="filters" aria-label="Frame filter">
      <button data-filter="all" class="active">all</button>
      <button data-filter="pending">pending</button>
      <button data-filter="keep">keep</button>
      <button data-filter="skip">skip</button>
    </div>
    <div class="counts" id="counts"></div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <p class="hint">
      Click a frame to cycle pending → keep → skip. Keyboard: arrows move,
      <kbd>K</kbd> keep, <kbd>S</kbd> skip, <kbd>U</kbd> reset to pending.
    </p>
  </main>
  <script src="/static/triage.js"></script>
</body>
</html>
