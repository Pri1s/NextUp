<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 940" role="img" aria-labelledby="title desc">
  <title id="title">Canonical basketball-court keypoints</title>
  <desc id="desc">North is at the top and east is at the right. Each numbered marker is one fixed court landmark.</desc>
  <style>
    .court { fill: #18181b; stroke: #d4d4d8; stroke-width: 4; }
    .line { fill: none; stroke: #d4d4d8; stroke-width: 3; }
    .subtle { fill: none; stroke: #71717a; stroke-width: 2; }
    .direction { fill: #d4d4d8; font: 700 18px system-ui, sans-serif; letter-spacing: 1px; }
    .marker { fill: #18181b; stroke: #ffc46b; stroke-width: 4; }
    .marker-label { fill: #fff4d7; font: 700 18px system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; pointer-events: none; paint-order: stroke; stroke: #18181b; stroke-width: 2px; }
    .keypoint.active .marker { fill: #2b5ec4; stroke: #d9ecff; stroke-width: 6; }
    .keypoint.active .marker-label { fill: white; }
  </style>
  <rect class="court" x="25" y="30" width="450" height="880" rx="2"/>
  <path class="line" d="M25 470H475 M190 30V190H310V30 M190 910V750H310V910"/>
  <circle class="line" cx="250" cy="470" r="62"/>
  <path class="line" d="M98 30 C98 285 402 285 402 30 M98 910 C98 655 402 655 402 910"/>
  <path class="subtle" d="M220 108h60M250 91v17 M220 832h60M250 832v17"/>
  <text class="direction" x="250" y="20" text-anchor="middle">NORTH</text>
  <text class="direction" x="490" y="470" text-anchor="end" transform="rotate(90 490 470)">EAST</text>
  <text class="direction" x="10" y="470" text-anchor="middle" transform="rotate(-90 10 470)">WEST</text>

  <g id="kpt-1" class="keypoint"><circle class="marker" cx="475" cy="30" r="13"/><text class="marker-label" x="475" y="30">1</text></g>
  <g id="kpt-2" class="keypoint"><circle class="marker" cx="402" cy="30" r="13"/><text class="marker-label" x="402" y="30">2</text></g>
  <g id="kpt-3" class="keypoint"><circle class="marker" cx="310" cy="30" r="13"/><text class="marker-label" x="310" y="30">3</text></g>
  <g id="kpt-4" class="keypoint"><circle class="marker" cx="190" cy="30" r="13"/><text class="marker-label" x="190" y="30">4</text></g>
  <g id="kpt-5" class="keypoint"><circle class="marker" cx="98" cy="30" r="13"/><text class="marker-label" x="98" y="30">5</text></g>
  <g id="kpt-6" class="keypoint"><circle class="marker" cx="25" cy="30" r="13"/><text class="marker-label" x="25" y="30">6</text></g>
  <g id="kpt-7" class="keypoint"><circle class="marker" cx="25" cy="470" r="13"/><text class="marker-label" x="25" y="470">7</text></g>
  <g id="kpt-8" class="keypoint"><circle class="marker" cx="475" cy="470" r="13"/><text class="marker-label" x="475" y="470">8</text></g>
  <g id="kpt-9" class="keypoint"><circle class="marker" cx="310" cy="190" r="13"/><text class="marker-label" x="310" y="190">9</text></g>
  <g id="kpt-10" class="keypoint"><circle class="marker" cx="190" cy="190" r="13"/><text class="marker-label" x="190" y="190">10</text></g>
  <g id="kpt-11" class="keypoint"><circle class="marker" cx="25" cy="910" r="13"/><text class="marker-label" x="25" y="910">11</text></g>
  <g id="kpt-12" class="keypoint"><circle class="marker" cx="98" cy="910" r="13"/><text class="marker-label" x="98" y="910">12</text></g>
  <g id="kpt-13" class="keypoint"><circle class="marker" cx="190" cy="910" r="13"/><text class="marker-label" x="190" y="910">13</text></g>
  <g id="kpt-14" class="keypoint"><circle class="marker" cx="310" cy="910" r="13"/><text class="marker-label" x="310" y="910">14</text></g>
  <g id="kpt-15" class="keypoint"><circle class="marker" cx="402" cy="910" r="13"/><text class="marker-label" x="402" y="910">15</text></g>
  <g id="kpt-16" class="keypoint"><circle class="marker" cx="475" cy="910" r="13"/><text class="marker-label" x="475" y="910">16</text></g>
  <g id="kpt-17" class="keypoint"><circle class="marker" cx="310" cy="750" r="13"/><text class="marker-label" x="310" y="750">17</text></g>
  <g id="kpt-18" class="keypoint"><circle class="marker" cx="190" cy="750" r="13"/><text class="marker-label" x="190" y="750">18</text></g>
</svg>
