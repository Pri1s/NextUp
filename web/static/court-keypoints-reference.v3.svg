<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 940" role="img" aria-labelledby="title desc">
  <title id="title">Canonical basketball-court keypoints (schema v3)</title>
  <desc id="desc">North is at the top and east is at the right. Each numbered marker is one fixed court landmark. Drawn to scale for an NFHS 84 by 50 foot court at 9 units per foot.</desc>
  <style>
    .court { fill: #18181b; stroke: #d4d4d8; stroke-width: 4; }
    .line { fill: none; stroke: #d4d4d8; stroke-width: 3; }
    .subtle { fill: none; stroke: #71717a; stroke-width: 2; }
    .direction { fill: #d4d4d8; font: 700 18px system-ui, sans-serif; letter-spacing: 1px; }
    .marker { fill: #18181b; stroke: #ffc46b; stroke-width: 4; }
    .marker-label { fill: #fff4d7; font: 700 18px system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; pointer-events: none; paint-order: stroke; stroke: #18181b; stroke-width: 2px; }
    .keypoint.active .marker { fill: #2b5ec4; stroke: #d9ecff; stroke-width: 6; }
    .keypoint.active .marker-label { fill: white; }
  </style>
  <rect class="court" x="25" y="92" width="450" height="756" rx="2"/>
  <path class="line" d="M25 470H475 M196 92V263H304V92 M196 848V677H304V848"/>
  <circle class="line" cx="250" cy="470" r="54"/>
  <path class="line" d="M72.25 92V139.25A177.75 177.75 0 0 0 427.75 139.25V92 M72.25 848V800.75A177.75 177.75 0 0 1 427.75 800.75V848"/>
  <circle class="subtle" cx="250" cy="263" r="54"/>
  <circle class="subtle" cx="250" cy="677" r="54"/>
  <path class="subtle" d="M223 128h54M250 128v11 M223 812h54M250 801v11"/>
  <text class="direction" x="250" y="58" text-anchor="middle">NORTH</text>
  <text class="direction" x="250" y="895" text-anchor="middle">SOUTH</text>
  <text class="direction" x="490" y="470" text-anchor="end" transform="rotate(90 490 470)">EAST</text>
  <text class="direction" x="10" y="470" text-anchor="middle" transform="rotate(-90 10 470)">WEST</text>

